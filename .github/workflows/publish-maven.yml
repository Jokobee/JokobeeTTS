name: Publish Free (core + free + aliases + Marine voice) to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.1.0) — must match coordinates() in core/free build.gradle.kts. The kokoro-french-voice-female modules publish at their own fixed 1.0.0 regardless of this input.'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Skip if version already on Maven Central
        id: check
        run: |
          VERSION="${{ github.event.inputs.version }}"
          URL="https://repo1.maven.org/maven2/com/jokobee/jokobeetts/${VERSION}/jokobeetts-${VERSION}.pom"
          if curl -sf "$URL" > /dev/null 2>&1; then
            echo "Version ${VERSION} already published — aborting."
            exit 1
          fi

      - name: Publish core + free + aliases + Marine voice to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x ./gradlew
          ./gradlew :core:publishToMavenCentral :free:publishToMavenCentral \
            :tts-ai-android:publishToMavenCentral :tts-android-ai:publishToMavenCentral \
            :kokoro-french-voice-female:publishToMavenCentral \
            :kokoro-female-french-voice:publishToMavenCentral \
            :kokoro-french-voice-marine:publishToMavenCentral \
            --no-configuration-cache --no-daemon
